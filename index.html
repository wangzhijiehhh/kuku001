<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>直达元宇宙 - 关注公众号</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'PingFang SC', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #000;
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 10;
            background: radial-gradient(circle at center, rgba(16, 32, 70, 0.8) 0%, rgba(0, 0, 0, 1) 80%);
        }

        .hologram-window {
            background: rgba(16, 32, 64, 0.3);
            border: 2px solid rgba(0, 255, 255, 0.3);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 
                0 0 30px rgba(0, 255, 255, 0.2),
                inset 0 0 15px rgba(0, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .qr-code-wrapper {
            width: 280px;
            height: 280px;
            background-color: #fff;
            border-radius: 8px;
            padding: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .qr-code-img {
            width: 100%;
            height: 100%;
            /* 关键修改在这里：直接读取刚才上传的图片文件 */
            background-image: url('qrcode.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .slogan {
            color: #00ffff;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            text-align: center;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hologram-window">
            <div class="qr-code-wrapper">
                <div class="qr-code-img"></div>
            </div>
            <p class="slogan">关注公众号，直达元宇宙</p>
        </div>
    </div>
</body>
</html>
